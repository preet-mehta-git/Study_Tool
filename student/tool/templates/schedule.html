{% extends 'base.html' %}
{% block title %} Schedule {% endblock %}

{% block content %}
<div class="container py-5">

    <div class="card shadow-lg mb-5">
        <div class="card-body p-4">
            <h4 class="card-title mb-3"><i class="fas fa-plus-circle me-2"></i>Add a New Schedule Event</h4>
            <form action="{% url 'schedule' %}" method="post">
                {% csrf_token %}
                <div class="row g-3">
                    <div class="col-md-6">
                        <label for="title" class="form-label">Event Title</label>
                        <input type="text" class="form-control" name="title" required>
                    </div>
                    <div class="col-md-3">
                        <label for="event_type" class="form-label">Event Type</label>
                        <select class="form-select" name="event_type">
                            <option value="study">Study Session</option>
                            <option value="exam">Exam</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label for="start" class="form-label">Date & Time</label>
                        <input type="datetime-local" class="form-control" name="start" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-100 mt-3">Add Event</button>
            </form>
        </div>
    </div>

    <div class="card shadow-lg">
        <div class="card-header calendar-header">
            <a href="{% url 'schedule' %}?year={{ prev_year }}&month={{ prev_month }}" class="btn btn-outline-light">&laquo; Previous</a>
            <h3>{{ current_month }} {{ current_year }}</h3>
            <a href="{% url 'schedule' %}?year={{ next_year }}&month={{ next_month }}" class="btn btn-outline-light">Next &raquo;</a>
        </div>
        <div class="card-body">
            {{ calendar|safe }}
        </div>
    </div>
</div>
{% endblock %}
