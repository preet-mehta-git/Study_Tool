{% load static %} <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="../static/css/register.css">
</head>
<body>

    <div class="auth-wrapper">
    <div class="auth-container">
        {% if messages %}
            <div class="messages mb-3">
                {% for message in messages %}
                    <div class="alert alert-danger" role="alert">
                        {{ message }}
                    </div>
                {% endfor %}
            </div>
        {% endif %}

        <div class="auth-header">
            <h1>Create Your Account</h1>
            <p>Join the Study Tool community!</p>
        </div>

        <form class="auth-form" method="POST">
            {% csrf_token %}
            <div class="row">
                <div class="col-md-4 mb-3">
                    <div class="form-floating input-group-with-icon">
                        <i class="fas fa-user"></i>
                        <input type="text" class="form-control" id="first_name" name="first_name" placeholder="First Name" required>
                        <label for="first_name">First Name</label>
                    </div>
                </div>
                <div class="col-md-4 mb-3">
                    <div class="form-floating input-group-with-icon">
                        <i class="fas fa-user"></i>
                        <input type="text" class="form-control" id="middle_name" name="middle_name" placeholder="Middle Name">
                        <label for="middle_name">Middle Name</label>
                    </div>
                </div>
                 <div class="col-md-4 mb-3">
                    <div class="form-floating input-group-with-icon">
                        <i class="fas fa-user"></i>
                        <input type="text" class="form-control" id="last_name" name="last_name" placeholder="Last Name" required>
                        <label for="last_name">Last Name</label>
                    </div>
                </div>
            </div>

            <div class="form-floating mb-3 input-group-with-icon">
                <i class="fas fa-envelope"></i>
                <input type="email" class="form-control" id="email" name="email" placeholder="name@example.com" required>
                <label for="email">Email address</label>
            </div>

            <div class="form-floating mb-3 input-group-with-icon">
                <i class="fas fa-lock"></i>
                <input type="password" class="form-control" id="password" name="password" placeholder="Password" required>
                <label for="password">Password</label>
            </div>
            
            <div class="row">
                <div class="col-md-6 mb-3">
                    <div class="form-floating input-group-with-icon">
                        <i class="fas fa-phone"></i>
                        <input type="tel" class="form-control" id="mobile_number" name="mobile_number" placeholder="Mobile Number" required>
                        <label for="mobile_number">Mobile Number</label>
                    </div>
                </div>
                <div class="col-md-6 mb-3">
                    <div class="form-floating input-group-with-icon">
                        <i class="fas fa-calendar-alt"></i>
                        <input type="date" class="form-control" id="birth_date" name="birth_date" required>
                        <label for="birth_date">Birth Date</label>
                    </div>
                </div>
            </div>

            <div class="form-floating mb-4 input-group-with-icon">
                <i class="fas fa-graduation-cap"></i>
                <input type="text" class="form-control" id="qualification" name="qualification" placeholder="Qualification" required>
                <label for="qualification">Qualification</label>
            </div>

            <button class="btn btn-primary w-100" type="submit">Create Account</button>
        </form>

        <p class="text-center mt-4 auth-footer">
            Already have an account? <a href="{% url 'login' %}">Sign In</a>
        </p>
    </div>
</div>

</body>
</html>
